name: Sign Unlisted

# Beta channel. Push to the `unlisted` branch to cut a beta:
#   - run CI (lint + test)
#   - build and submit to AMO with --channel unlisted (auto-signed, not
#     published on the AMO listing page)
#   - attach the signed .xpi to a GitHub pre-release tagged with the
#     manifest version, release notes auto-generated from commits.
#
# Pages publication of docs/ (the per-minor What's New pages and
# version.json the active update-check fetches) is handled separately
# by GitHub's "Deploy from a branch" mode: Settings → Pages → Source
# = Deploy from a branch / master / docs. Each master push auto-rebuilds
# Pages — no workflow steps needed here.
#
# Run `npm run create-unlisted` locally instead of pushing manually —
# the script handles the version bump (4th-segment counter), syncs
# manifest.json + docs/version.json, lints, commits, and pushes
# master then master:unlisted in one go (so the master push triggers
# the Pages rebuild and the unlisted push triggers this workflow).

on:
  push:
    branches: [unlisted]

permissions:
  contents: write   # create the GitHub Release + tag

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # release-notes generator needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run lint

      - name: Read manifest version
        id: version
        run: |
          v=$(node -p "require('./addon/manifest.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Submit to AMO (unlisted channel)
        working-directory: addon
        run: |
          npx web-ext sign \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            --channel unlisted

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} (beta)
          prerelease: true
          generate_release_notes: true
          files: addon/web-ext-artifacts/*.xpi
