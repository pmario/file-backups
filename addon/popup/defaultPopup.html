<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="style.css">
</head>

<body class="panel">
	<div class="panel-section panel-section-header">
		<div class="text-section-header">File Backups - For TiddlyWiki - <span id="version" style="font-size: .7em">Version</span></div>
	</div>

	<div id="update-chip" class="panel-section update-chip" hidden>
		<span class="update-chip-label" id="update-chip-label"></span>
		<button type="button" id="update-chip-view" class="update-chip-button">View</button>
		<button type="button" id="update-chip-dismiss" class="update-chip-button">Got it</button>
	</div>

	<form id="backup-form">
		<section class="panel-section panel-section-formElements">
			<div class="panel-formElements-item">
				<label for="backupenabled">Backups Enabled:</label>
				<input type="checkbox" id="backupenabled">
			</div>
			<div class="panel-formElements-item">
				<label for="backupdir">Backup Directory:</label>
				<input type="text" id="backupdir" required aria-describedby="backupdir-error">
			</div>
			<div class="validation-error" id="backupdir-error" role="alert"></div>
			<div class="panel-formElements-item">
				<label for="amount">Number of Backup Files:</label>
				<input type="number" id="amount" min="1" step="1" max="26" required>
			</div>
		</section>
		<footer class="panel-section panel-section-footer">
			<button type="submit" class="panel-section-footer-button default">Save Settings</button>
			<div class="panel-section-footer-separator"></div>
			<button type="button" id="footer-info-btn" class="panel-section-footer-button">What's New</button>
		</footer>
	</form>
	<script src="../libs/validate.js"></script>
	<script src="defaultPopup.js"></script>
</body>

</html>
